<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Quiz Practice</h1>
            <div class="score-board">
                <span>Score: <span id="score">0</span></span>
                <span>Question: <span id="current">1</span>/<span id="total">0</span></span>
            </div>
        </header>

        <div id="quiz-container">
            <div class="question-card">
                <h2 id="question">Loading question...</h2>
                <div class="options" id="options"></div>
                <div class="controls">
                    <button id="submit-btn" class="btn btn-primary">Submit Answer</button>
                    <button id="next-btn" class="btn btn-secondary" style="display: none;">Next Question</button>
                </div>
                <div id="feedback" class="feedback"></div>
            </div>
        </div>

        <div id="results" class="results" style="display: none;">
            <h2>Quiz Complete!</h2>
            <p class="final-score">Your Score: <span id="final-score">0</span>/<span id="final-total">0</span></p>
            <p class="percentage">Percentage: <span id="percentage">0</span>%</p>
            <button id="restart-btn" class="btn btn-primary">Restart Quiz</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
